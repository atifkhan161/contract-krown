<!DOCTYPE html>
<html lang="en" data-theme="midnight-sapphire">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Contract Crown">
  <meta name="description" content="Contract Crown - A 4-player trick-taking card game">
  <title>Contract Crown</title>
  <link rel="icon" type="image/svg+xml" href="/assets/icon.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">

  <!-- Apple PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Contract Crown">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script>
    // Auto-detect WebSocket URL based on current environment
    // PartyKit serves both HTTP and WebSocket on the same port
    const isProduction = location.protocol === 'https:';
    const wsProtocol = isProduction ? 'wss:' : 'ws:';
    // Use the same port as the current page (PartyKit uses same port for HTTP and WS)
    window.WS_URL = `${wsProtocol}//${location.host}`;
    console.log('[Config] WebSocket URL:', window.WS_URL);
  </script>
  <script src="/app.js"></script>
</body>

</html>
